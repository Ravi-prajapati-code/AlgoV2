# Logrotate config for AlgoV2 trading system
# Install on server:
#   sudo cp config/logrotate_algo.conf /etc/logrotate.d/algov2
#   sudo logrotate -d /etc/logrotate.d/algov2   # dry-run test
#   sudo logrotate -f /etc/logrotate.d/algov2   # force run once

/home/ubuntu/AlgoV2/logs/*.log {
    daily
    rotate 30
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
    dateext
    dateformat -%Y%m%d
}
